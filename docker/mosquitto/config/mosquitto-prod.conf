# Mosquitto MQTT broker configuration for ice-colder PRODUCTION
#
# Requires a password file at /mosquitto/config/passwd
# Generate with:  docker exec ice-colder-mqtt mosquitto_passwd -c /mosquitto/config/passwd vmc
#
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type error
log_type notice
